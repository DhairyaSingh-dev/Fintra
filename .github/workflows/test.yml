name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Job 1: Run tests on all Python versions in parallel
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run tests with pytest
      id: pytest
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --tb=short | tee test_output.txt
        echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
      env:
        FLASK_ENV: testing
        FLASK_SECRET_KEY: test-secret-key-for-ci
        ACCESS_TOKEN_JWT_SECRET: test-access-token-secret-min-32-chars
        REFRESH_TOKEN_JWT_SECRET: test-refresh-token-secret-min-32-chars
      continue-on-error: true

    - name: Parse test results
      id: parse
      run: |
        # Extract test counts from output (trim whitespace)
        PASSED=$(grep -oP '\d+ passed' test_output.txt | grep -oP '\d+' | head -1 || echo "0")
        FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' | head -1 || echo "0")
        SKIPPED=$(grep -oP '\d+ skipped' test_output.txt | grep -oP '\d+' | head -1 || echo "0")
        ERROR=$(grep -oP '\d+ error' test_output.txt | grep -oP '\d+' | head -1 || echo "0")
        
        # Get coverage from pytest output line
        COVERAGE_LINE=$(grep -oP '\d+\.\d+%' test_output.txt | tail -1 || echo "0%")
        COVERAGE=${COVERAGE_LINE:-"0%"}
        
        # Get exit code and trim whitespace
        EXIT_CODE=$(echo "${{ steps.pytest.outputs.exit_code }}" | tr -d '[:space:]')
        
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT
        echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
        echo "error=$ERROR" >> $GITHUB_OUTPUT
        echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        
        # Create result file for aggregation (ensure integers for exit_code)
        echo "{\"python_version\": \"${{ matrix.python-version }}\", \"passed\": ${PASSED:-0}, \"failed\": ${FAILED:-0}, \"skipped\": ${SKIPPED:-0}, \"error\": ${ERROR:-0}, \"coverage\": \"$COVERAGE\", \"exit_code\": ${EXIT_CODE:-1}}" > result.json
        
        # Debug output
        echo "Debug: Exit code is '$EXIT_CODE'"
        echo "Debug: Result file contents:"
        cat result.json

    - name: Upload test results artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-result-py${{ matrix.python-version }}
        path: |
          result.json
          test_output.txt
          htmlcov/
          coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests-py${{ matrix.python-version }}
        name: codecov-py${{ matrix.python-version }}
        fail_ci_if_error: false

  # Job 2: Generate unified report
  report:
    name: Unified Test Report
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: test-result-py*

    - name: Generate unified report
      id: report
      run: |
        echo "# 🧪 Unified Test Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Python Version | Status | Passed | Failed | Skipped | Errors | Coverage |" >> $GITHUB_STEP_SUMMARY
        echo "|----------------|--------|--------|--------|---------|--------|----------|" >> $GITHUB_STEP_SUMMARY
        
        OVERALL_STATUS="✅ PASSED"
        TOTAL_PASSED=0
        TOTAL_FAILED=0
        TOTAL_SKIPPED=0
        TOTAL_ERRORS=0
        
        # Debug: List what we have
        echo "Debug: Contents of artifacts directory:"
        ls -la artifacts/ || echo "No artifacts directory"
        
        for version in 3.9 3.10 3.11; do
          # Try both possible paths
          result_file="artifacts/test-result-py${version}/result.json"
          alt_result_file="artifacts/result.json"
          
          echo "Debug: Looking for ${result_file}"
          
          if [ -f "$result_file" ]; then
            echo "Debug: Found result file for Python ${version}"
            
            # Parse JSON results with better error handling
            PASSED=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('passed', 0))")
            FAILED=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('failed', 0))")
            SKIPPED=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('skipped', 0))")
            ERRORS=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('error', 0))")
            COVERAGE=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('coverage', '0%'))")
            EXIT_CODE=$(python3 -c "import json; data=json.load(open('$result_file')); print(data.get('exit_code', 1))")
            
            echo "Debug: Python ${version} - Exit code: ${EXIT_CODE}, Passed: ${PASSED}, Failed: ${FAILED}"
            
            # Determine status based on actual test failures (not exit code which may be 1 due to coverage)
            if [ "$FAILED" = "0" ] && [ "$ERRORS" = "0" ]; then
              STATUS="✅ PASS"
            else
              STATUS="❌ FAIL"
              OVERALL_STATUS="❌ FAILED"
            fi
            
            # Update totals
            TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            
            echo "| Python ${version} | ${STATUS} | ${PASSED} | ${FAILED} | ${SKIPPED} | ${ERRORS} | ${COVERAGE} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Debug: Result file not found for Python ${version}"
            echo "| Python ${version} | ⚠️ MISSING | - | - | - | - | - |" >> $GITHUB_STEP_SUMMARY
            OVERALL_STATUS="❌ FAILED"
          fi
        done
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Overall Status:** ${OVERALL_STATUS}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Total Passed | ${TOTAL_PASSED} |" >> $GITHUB_STEP_SUMMARY
        echo "| Total Failed | ${TOTAL_FAILED} |" >> $GITHUB_STEP_SUMMARY
        echo "| Total Skipped | ${TOTAL_SKIPPED} |" >> $GITHUB_STEP_SUMMARY
        echo "| Total Errors | ${TOTAL_ERRORS} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Set job output
        echo "overall_status=${OVERALL_STATUS}" >> $GITHUB_OUTPUT
        
        # Fail if overall status is failed
        if [ "$OVERALL_STATUS" == "❌ FAILED" ]; then
          exit 1
        fi

    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read all result files
          const versions = ['3.9', '3.10', '3.11'];
          let report = '## 🧪 Test Results Summary\n\n';
          report += '| Python Version | Status | Passed | Failed | Coverage |\n';
          report += '|----------------|--------|--------|--------|----------|\n';
          
          let overallSuccess = true;
          
          for (const version of versions) {
            try {
              const resultFile = `artifacts/test-result-py${version}/result_${version}.json`;
              const data = JSON.parse(fs.readFileSync(resultFile, 'utf8'));
              const status = data.exit_code === 0 ? '✅' : '❌';
              if (data.exit_code !== 0) overallSuccess = false;
              
              report += `| Python ${version} | ${status} | ${data.passed} | ${data.failed} | ${data.coverage} |\n`;
            } catch (e) {
              report += `| Python ${version} | ⚠️ | - | - | - |\n`;
              overallSuccess = false;
            }
          }
          
          report += '\n' + (overallSuccess ? '✅ **All tests passed!**' : '❌ **Some tests failed**');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });